name: R package checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  public-release-check:
    name: Public release safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run public release safety check
        run: bash tools/public-release-check.sh "$GITHUB_WORKSPACE"

  r-cmd-check:
    name: R CMD check (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pharmax
          - pharmax.viz
          - pharmax.ml

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install package dependencies
        run: |
          install.packages(c("pak", "rcmdcheck"))
          pak::local_install_dev_deps(dependencies = TRUE, upgrade = FALSE)
        shell: Rscript {0}

      - name: Run tests
        run: testthat::test_local()
        shell: Rscript {0}

      - name: Run R CMD check
        run: |
          result <- rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "warning",
            check_dir = "check"
          )
          print(result)
        shell: Rscript {0}
